name: Publish to Python Package Indices

on:
  release:
    types: [published]

  workflow_dispatch:

jobs:
  pypi:
    name: Upload release to the Python Package Index (PyPI)
    runs-on: ubuntu-latest
    environment: release
    permissions:
        id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install build tools
        run: python3 -m pip install --upgrade build

      - name: Build wheel
        run: python3 -m build

      - name: Publish wheel
        uses: pypa/gh-action-pypi-publish@release/v1

  envelope:
    name: Upload release to Envelope.dev
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install build tools
        run: python3 -m pip install --upgrade build

      - name: Build wheel
        run: python3 -m build

      - name: Publish wheel
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: false
          password: ${{ secrets.ENVELOPE_TOKEN }}
          user: pypi
          repository-url: https://app.envelope.dev/legacy/
